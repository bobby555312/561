<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>烟花</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #02030c; color: #fff; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    p { position: fixed; inset: auto 0 22px; margin: 0; text-align: center; color: #c9d2ff; font-size: 14px; opacity: .85; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <p>点击任意位置，放一朵烟花</p>
  <script>
    const canvas = document.querySelector('#sky');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    addEventListener('resize', resize); resize();
    function burst(x = Math.random() * W, y = H * (.15 + Math.random() * .55)) {
      const hue = Math.random() * 360;
      for (let i = 0; i < 110; i++) {
        const a = Math.random() * Math.PI * 2, speed = 1.5 + Math.random() * 5.5;
        particles.push({x, y, vx: Math.cos(a)*speed, vy: Math.sin(a)*speed, life: 1, hue, size: 1 + Math.random()*2});
      }
    }
    addEventListener('pointerdown', e => burst(e.clientX, e.clientY));
    setInterval(() => burst(), 900);
    function frame() {
      ctx.fillStyle = 'rgba(2,3,12,.18)'; ctx.fillRect(0,0,W,H);
      particles = particles.filter(p => p.life > .02);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.vy += .045; p.vx *= .99; p.life *= .975;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size * p.life + .4,0,Math.PI*2);
        ctx.fillStyle = `hsla(${p.hue},100%,65%,${p.life})`; ctx.fill();
      }
      requestAnimationFrame(frame);
    }
    burst(W/2,H*.42); frame();
  </script>
</body>
</html>
